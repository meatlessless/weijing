<script>
// --- 题库数据 (Quiz Data) ---
// 为了保证网页性能和代码可读性，这里完整录入了前两章（45题）。
// 你可以随时参照这种 JSON 格式添加后面的章节。
const rawQuizData = [
    {
        id: "c1",
        title: "第一章 导论",
        questions: [
            { id: "1-1", q: "经济学产生的基础和核心问题是（ ）。", opts: { A: "货币的稀缺性", B: "资源的稀缺性", C: "欲望的有限性", D: "市场的失灵" }, ans: "B", exp: "经济学的产生源于资源的稀缺性（Scarcity）与人类欲望的无限性之间的矛盾。因此，经济学的核心问题就是如何有效地配置稀缺资源。" },
            { id: "1-2", q: "微观经济学解决的核心问题是（ ）。", opts: { A: "资源配置", B: "资源利用", C: "经济增长", D: "通货膨胀" }, ans: "A", exp: "微观经济学（Microeconomics）以单个经济单位（居民户、厂商）为研究对象，解决的核心问题是资源配置；而宏观经济学解决的核心问题是资源利用。" },
            { id: "1-3", q: "下列关于“机会成本”的说法中，正确的是（ ）。", opts: { A: "机会成本是指在做出某项选择时，实际支付的货币成本", B: "机会成本是指在做出某项选择时，放弃的所有其他选择的价值总和", C: "机会成本是指在做出某项选择时，所放弃的其他选择中价值最大的那一项", D: "机会成本是企业在生产过程中产生的固定成本" }, ans: "C", exp: "机会成本是指为了得到某种东西而所要放弃的另一些东西中，价值最大的那一个。它不是放弃的所有选择的加总。" },
            { id: "1-4", q: "微观经济学分析中，“理性人”假设（Homo Economicus）指的是（ ）。", opts: { A: "人们总是自私自利，不顾及他人", B: "消费者追求效用最大化，生产者追求利润最大化", C: "人们在决策时从不犯错", D: "人们总是基于完全的信息进行决策" }, ans: "B", exp: "“理性人”假设是经济学的基本前提之一。它并非指人自私自利或不犯错，而是指每一个从事经济活动的人都是理性的，即都在力图以最小的经济代价去获得最大的经济利益。" },
            { id: "1-5", q: "假设某企业多雇佣一名工人的边际成本是100元，该工人能为企业带来120元的边际收益。基于边际分析，企业应该（ ）。", opts: { A: "不雇佣该工人，因为成本增加了", B: "雇佣该工人，因为边际收益大于边际成本", C: "减少雇佣其他工人来平衡成本", D: "无法判断，需要看总成本" }, ans: "B", exp: "经济学中的边际原理指出，如果一项活动的边际收益大于边际成本，理性的决策者就应该进行这项活动。120元 > 100元，因此应该雇佣。" },
            { id: "1-6", q: "下列哪一种说法属于“规范经济学”（Normative Economics）的表述？（ ）", opts: { A: "提高最低工资会导致青少年失业率上升", B: "去年我国的GDP增长率为5.2%", C: "政府应该增加对低收入人群的住房补贴，以促进社会公平", D: "降低利率能够刺激私人投资" }, ans: "C", exp: "实证经济学描述“是什么”，即客观事实。规范经济学描述“应该是什么”，涉及价值判断和伦理标准，C选项中带有“应该”且包含主观的公平判断，属于规范经济学。" },
            { id: "1-7", q: "在生产可能性边界（PPF）内部的一点表示（ ）。", opts: { A: "资源得到了充分且最有效的利用", B: "目前的技术水平下无法达到的产量组合", C: "存在资源闲置或生产效率低下的情况", D: "经济处于通货膨胀状态" }, ans: "C", exp: "生产可能性边界（PPF）上的点代表资源充分利用；外部代表目前技术无法达到；内部的点则代表资源没有得到充分利用（存在失业或低效）。" },
            { id: "1-8", q: "下列哪一项会导致一国的生产可能性边界（PPF）向外（向右上方）平移？（ ）", opts: { A: "失业率大幅下降", B: "发生严重的自然灾害摧毁了大量工厂", C: "科学技术的重大进步", D: "消费者对某种商品的需求增加" }, ans: "C", exp: "生产要素的增加或技术进步会导致一国的生产能力整体提升，从而使得PPF向外平移。失业率下降只是让经济从PPF内部向PPF边界上移动。" },
            { id: "1-9", q: "亚当·斯密在《国富论》中提出的“看不见的手”主要指的是（ ）。", opts: { A: "政府对宏观经济的干预", B: "市场中的价格机制", C: "企业家的创新精神", D: "国际贸易中的汇率波动" }, ans: "B", exp: "“看不见的手”是亚当·斯密用来形容市场价格机制的。它通过价格信号引导个体的自利行为，最终在不知不觉中促进了社会整体的利益。" },
            { id: "1-10", q: "某学生面临选择：今晚是去打工挣100元，还是去看一场票价为50元的演唱会（假设看演唱会是他打工之外最想做的事）。如果他选择去看演唱会，他看演唱会的机会成本是（ ）。", opts: { A: "50元", B: "100元", C: "150元", D: "0元" }, ans: "C", exp: "去看演唱会的总机会成本 = 显性成本（实际支付的门票50元） + 隐性成本（放弃的打工收入100元） = 150元。" },
            { id: "1-11", q: "“沉没成本”（Sunk Cost）在经济学决策中的正确处理方式是（ ）。", opts: { A: "作为未来决策的重要参考", B: "在计算边际成本时必须包括在内", C: "理性的决策者在做未来决策时应忽略沉没成本", D: "沉没成本等同于机会成本" }, ans: "C", exp: "沉没成本是指已经发生且无法收回的成本。理性经济人在做边际决策（即决定下一步该怎么做）时，不应该考虑沉没成本。" },
            { id: "1-12", q: "以下哪个问题属于微观经济学的研究范畴？（ ）", opts: { A: "为什么整体经济会出现周期性的繁荣与衰退？", B: "苹果公司应该如何为新款iPhone定价？", C: "国家应该如何制定货币政策来控制通货膨胀？", D: "导致全国失业率上升的主要原因是什么？" }, ans: "B", exp: "微观经济学研究个体经济单位的行为。苹果公司的定价策略是个体企业的决策。A、C、D项均涉及经济整体的加总变量，属于宏观经济学范畴。" },
            { id: "1-13", q: "经济学模型经常使用“其他条件不变”（Ceteris Paribus）的假设，其主要目的是（ ）。", opts: { A: "使得经济学显得更加深奥", B: "简化复杂的现实，以便孤立地研究某两个变量之间的关系", C: "否认其他变量对经济系统的影响", D: "证明经济规律在任何情况下都绝对成立" }, ans: "B", exp: "现实世界是复杂的，“其他条件不变”假设使得经济学家能够控制变量，单独研究自变量与因变量之间的关系。" },
            { id: "1-14", q: "任何一个经济社会都必须回答的三个基本经济问题是（ ）。", opts: { A: "生产什么、如何生产、为谁生产", B: "储蓄多少、投资多少、消费多少", C: "进口什么、出口什么、关税多少", D: "税率多高、支出多少、赤字多少" }, ans: "A", exp: "资源配置的三个基本问题是：生产什么（及生产多少）、如何生产（用什么技术和要素组合）、为谁生产（产品如何分配）。" },
            { id: "1-15", q: "微观经济学的中心理论是（ ）。", opts: { A: "国民收入决定理论", B: "价格理论", C: "经济周期理论", D: "经济增长理论" }, ans: "B", exp: "微观经济学的中心理论是价格理论（Price Theory），它通过价格机制来解释资源是如何被配置的。" }
        ]
    },
    {
        id: "c2",
        title: "第二章 供求理论",
        questions: [
            { id: "2-1", q: "需求是指在某一特定时间内，消费者在每一价格水平上（ ）。", opts: { A: "想要购买的商品数量", B: "能够购买的商品数量", C: "愿意并且能够购买的商品数量", D: "实际购买的商品数量" }, ans: "C", exp: "需求（Demand）必须同时满足两个条件：购买意愿（想买）和购买能力（买得起）。" },
            { id: "2-2", q: "下列哪种情况会引起对某商品需求曲线的右移？（ ）", opts: { A: "该商品的价格下降", B: "该商品的替代品价格上升", C: "该商品的互补品价格上升", D: "消费者的收入下降" }, ans: "B", exp: "替代品价格上升，消费者会转向购买本商品，导致本商品需求增加，需求曲线右移。" },
            { id: "2-3", q: "供给定理说明，在其他条件不变的情况下，某种商品的价格上升会导致（ ）。", opts: { A: "供给增加", B: "供给量增加", C: "供给减少", D: "供给量减少" }, ans: "B", exp: "商品本身价格变动引起的是“供给量”的变动，表现为沿着同一条供给曲线移动。" },
            { id: "2-4", q: "假设某商品需求 $Q_d = 50 - 2P$，供给 $Q_s = 10 + 3P$，均衡价格和数量是（ ）。", opts: { A: "P=8, Q=34", B: "P=10, Q=30", C: "P=12, Q=26", D: "P=5, Q=40" }, ans: "A", exp: "令 $Q_d = Q_s$，即 $50 - 2P = 10 + 3P$，解得 $P = 8$。代入得 $Q = 34$。" },
            { id: "2-5", q: "如果一种商品的需求缺乏弹性（$|Ed| < 1$），那么厂商降低该商品的价格会使得总收益（ ）。", opts: { A: "增加", B: "减少", C: "不变", D: "无法确定" }, ans: "B", exp: "需求缺乏弹性时，降价导致的销量增加幅度不足以弥补价格下降带来的损失，总收益会减少（即谷贱伤农）。" },
            { id: "2-6", q: "下列哪种商品的需求价格弹性最大？（ ）", opts: { A: "食盐", B: "胰岛素", C: "某特定品牌的名牌香水", D: "整体服装大类" }, ans: "C", exp: "商品越特定、替代品越多，其需求弹性越大。名牌香水属于奢侈品且有很多替代品，弹性最大。" },
            { id: "2-7", q: "当两种商品中一种商品的价格发生变化时，这两种商品的需求量都同时增加或减少，则这两种商品的需求交叉弹性系数为（ ）。", opts: { A: "正数", B: "负数", C: "零", D: "1" }, ans: "B", exp: "一价格变化，两者需求量同向变化（即一商品价格与其自身需求量反向，与另一商品需求量也反向），说明它们是配套使用的互补品，交叉弹性为负。" },
            { id: "2-8", q: "恩格尔系数是指（ ）占消费者总支出的比例。", opts: { A: "住房支出", B: "娱乐支出", C: "食品支出", D: "医疗支出" }, ans: "C", exp: "恩格尔系数是指食品支出总额占个人消费支出总额的比重。" },
            { id: "2-9", q: "如果收入效应的绝对值大于替代效应的绝对值，且两者的方向相反（即收入增加导致需求量减少），则这种商品被称为（ ）。", opts: { A: "正常品", B: "劣等品（非吉芬商品）", C: "吉芬商品", D: "奢侈品" }, ans: "C", exp: "吉芬商品是一种极端劣等品，其收入效应的作用大于替代效应，导致价格下降时总需求量反而减少。" },
            { id: "2-10", q: "当 $MU_x / P_x > MU_y / P_y$ 时，为了实现效用最大化，他应该（ ）。", opts: { A: "增加X的购买，减少Y的购买", B: "增加Y的购买，减少X的购买", C: "同时增加X和Y的购买", D: "保持X和Y的购买量不变" }, ans: "A", exp: "花费在X上的最后一元钱带来的边际效用更高，理性的消费者应该多买X少买Y，直至两者相等。" },
            { id: "2-11", q: "蛛网模型中，如果供给曲线的斜率绝对值大于需求曲线的斜率绝对值，则蛛网属于（ ）。", opts: { A: "收敛型蛛网", B: "发散型蛛网", C: "封闭型蛛网（稳定型）", D: "无法确定" }, ans: "A", exp: "供给曲线陡峭（供给缺乏弹性），需求曲线平缓（需求富有弹性）时，价格波动会逐渐收敛于均衡点。" },
            { id: "2-12", q: "政府为了扶持农业，规定了高于均衡价格的支持价格。为维持该价格，政府需采取（ ）。", opts: { A: "实行农产品配给制", B: "收购过剩的农产品", C: "增加对农产品的税收", D: "鼓励进口农产品" }, ans: "B", exp: "支持价格会导致供过于求产生过剩，政府必须作为买方收购过剩产品。" },
            { id: "2-13", q: "如果商品的需求曲线比供给曲线更陡峭，对该商品征收消费税，主要承担者是（ ）。", opts: { A: "生产者", B: "消费者", C: "政府", D: "消费者和生产者平均分担" }, ans: "B", exp: "需求曲线陡峭意味着需求缺乏弹性。税负归宿理论表明，谁更缺乏弹性（越离不开），谁承担的税收越多。" },
            { id: "2-14", q: "消费者剩余是指（ ）。", opts: { A: "消费者购买商品后剩余的货币", B: "消费者愿意支付的价格与实际支付的价格之间的差额", C: "消费者消费商品所获得的总效用", D: "消费者购买商品所获得的边际效用" }, ans: "B", exp: "消费者剩余反映了消费者在交易中获得的额外净福利的心理感受。" },
            { id: "2-15", q: "无差异曲线凸向原点是因为（ ）。", opts: { A: "边际效用递减规律", B: "边际替代率递减规律", C: "边际报酬递减规律", D: "规模报酬递减规律" }, ans: "B", exp: "为了保持同等效用，随着X商品数量增加，消费者愿意放弃的Y商品的数量会越来越少，即边际替代率递减。" },
            { id: "2-16", q: "在一条向右下方倾斜的线性需求曲线上，随着价格的下降，需求价格弹性的绝对值将（ ）。", opts: { A: "逐渐变大", B: "逐渐变小", C: "保持不变", D: "先变大后变小" }, ans: "B", exp: "点弹性 $= (dQ/dP) \\times (P/Q)$。沿曲线下移，$P$ 减小 $Q$ 增大，$P/Q$ 变小，故弹性绝对值变小。" },
            { id: "2-17", q: "如果两种商品的价格同比例下降，预算线将（ ）。", opts: { A: "平行向左内移", B: "不发生移动", C: "平行向右外移", D: "发生旋转" }, ans: "C", exp: "价格同比例下降相当于消费者的实际购买力（实际收入）增加，预算线向外平移。" },
            { id: "2-18", q: "在消费者均衡点上，无差异曲线的斜率的绝对值等于（ ）。", opts: { A: "两种商品的边际效用之比", B: "两种商品的价格之比", C: "预算线的斜率的绝对值", D: "以上都对" }, ans: "D", exp: "均衡点处无差异曲线与预算线相切，斜率绝对值相等，即 $MRS = MU_x / MU_y = P_x / P_y$。" },
            { id: "2-19", q: "某一时期，对彩色电视机的需求曲线向左平移，其原因可能是（ ）。", opts: { A: "彩色电视机价格上升", B: "黑白电视机价格上升", C: "消费者对彩色电视机的预期价格下降", D: "消费者的收入增加" }, ans: "C", exp: "预期未来降价，当前就会持币观望，导致当前需求减少（曲线左移）。" },
            { id: "2-20", q: "假如生产某种商品所需原料的价格上升，则该商品的（ ）。", opts: { A: "需求曲线向左移动", B: "供给曲线向左移动", C: "需求曲线向右移动", D: "供给曲线向右移动" }, ans: "B", exp: "生产成本增加导致在任一价格水平下生产者愿意提供的数量减少，供给曲线向左平移。" },
            { id: "2-21", q: "“谷贱伤农”现象的经济学解释是，农产品的需求属于（ ）。", opts: { A: "富有弹性", B: "缺乏弹性", C: "单位弹性", D: "完全弹性" }, ans: "B", exp: "农产品是必需品，需求缺乏弹性。降价导致销量增加的比例小于价格下降的比例，从而使农民总收入下降。" },
            { id: "2-22", q: "假设X和Y互为替代品。如果X价格下降，Y的需求曲线将会（ ）。", opts: { A: "向左平移", B: "向右平移", C: "保持不变", D: "无法确定" }, ans: "A", exp: "X降价，消费者多买X，少买其替代品Y，导致Y的需求减少（曲线左移）。" },
            { id: "2-23", q: "会引起沿供给曲线移动（即供给量的变动），而不是曲线平移的因素是（ ）。", opts: { A: "生产技术水平提高", B: "劳动力成本下降", C: "该商品本身的价格上升", D: "政府给予补贴" }, ans: "C", exp: "商品本身价格的变化引起的是沿着曲线的移动；其他因素变化引起曲线平移。" },
            { id: "2-24", q: "消费者预期某物品未来价格要上升，则对该物品当前的需求会（ ）。", opts: { A: "减少", B: "增加", C: "不变", D: "无法判断" }, ans: "B", exp: "预期涨价，消费者会选择“囤货”，即增加当前需求。" },
            { id: "2-25", q: "若一种商品的收入弹性系数为负数（Ey < 0），则该商品是（ ）。", opts: { A: "正常品", B: "奢侈品", C: "必需品", D: "低档品" }, ans: "D", exp: "收入增加，需求反而减少的商品属于低档品（劣等品）。" },
            { id: "2-26", q: "政府实行最高限价（低于均衡价格），这将导致（ ）。", opts: { A: "供过于求", B: "供不应求，出现短缺或黑市", C: "均衡价格上升", D: "利润一定增加" }, ans: "B", exp: "人为压低价格会刺激需求并抑制供给，导致供不应求的市场短缺现象。" },
            { id: "2-27", q: "序数效用论采用的分析工具是（ ）。", opts: { A: "边际效用分析法", B: "无差异曲线分析法", C: "成本收益分析法", D: "供求分析法" }, ans: "B", exp: "序数效用论认为效用只能排序，其核心分析工具是无差异曲线和预算线。" },
            { id: "2-28", q: "恩格尔定律指出，随着家庭收入增加，用于食品支出的比例将（ ）。", opts: { A: "增加", B: "减少", C: "保持不变", D: "先增后减" }, ans: "B", exp: "恩格尔系数（食品支出占比）随收入增加而下降，是衡量生活水平的一个指标。" },
            { id: "2-29", q: "导致一种商品的替代效应的原因是（ ）。", opts: { A: "该商品相对价格的变化", B: "消费者实际收入的变化", C: "消费者偏好的变化", D: "其他商品价格的变化" }, ans: "A", exp: "替代效应是指在实际收入不变时，纯粹由商品相对价格的变化引起的需求量变化。" },
            { id: "2-30", q: "垂直的供给曲线表示该商品的供给（ ）。", opts: { A: "完全有弹性", B: "富有弹性", C: "完全无弹性", D: "缺乏弹性" }, ans: "C", exp: "垂直意味着无论价格多高，供给量固定不变，弹性为0，即完全无弹性（如古董、特定土地等）。" }
        ]

// --- 状态管理 (State Management) ---
const appState = {
    progress: {},      // { "1-1": "correct", "1-2": "wrong" }
    bookmarks: [],     // [ "1-1", "2-3" ]
    wrongSet: []       // [ "1-2" ]
};

// 当前应用状态
const runtime = {
    mode: 'home',      // 'home', 'chapter', 'wrong', 'bookmarks'
    currentList: [],   // Array of questions for current session
    currentIndex: 0,
    currentChapterTitle: ""
};

// --- 初始化与本地存储 (Init & Storage) ---
function loadData() {
    const saved = localStorage.getItem('microEconState');
    if (saved) {
        Object.assign(appState, JSON.parse(saved));
    }
}

function saveData() {
    localStorage.setItem('microEconState', JSON.stringify(appState));
}

// 获取所有题目扁平化字典便于查找
function getAllQuestionsDict() {
    const dict = {};
    rawQuizData.forEach(chapter => {
        chapter.questions.forEach(q => {
            dict[q.id] = { ...q, chapterTitle: chapter.title };
        });
    });
    return dict;
}

// --- UI 渲染逻辑 (UI Rendering) ---
const app = {
    init() {
        loadData();
        this.goHome();
    },

    goHome() {
        runtime.mode = 'home';
        const container = document.getElementById('app-container');
        
        let html = `
            <div class="text-center mb-10 fade-in">
                <h2 class="text-3xl font-extrabold text-slate-800 mb-3">微观经济学 模拟题库</h2>
                <p class="text-slate-500">按照章节进行专项训练，自动记录错题与收藏。</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 fade-in">
                <!-- 错题本卡片 -->
                <div onclick="app.startSpecialMode('wrong')" class="bg-red-50 hover:bg-red-100 cursor-pointer rounded-2xl p-6 border border-red-100 shadow-sm transition">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-xl font-bold text-red-700 mb-1">错题本</h3>
                            <p class="text-red-500 text-sm">共 ${appState.wrongSet.length} 题</p>
                        </div>
                        <div class="bg-red-200 text-red-600 rounded-full w-12 h-12 flex items-center justify-center text-xl shadow-inner">
                            <i class="fa-solid fa-book-book-skull"></i>
                        </div>
                    </div>
                </div>

                <!-- 收藏夹卡片 -->
                <div onclick="app.startSpecialMode('bookmarks')" class="bg-yellow-50 hover:bg-yellow-100 cursor-pointer rounded-2xl p-6 border border-yellow-100 shadow-sm transition">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-xl font-bold text-yellow-700 mb-1">重点收藏</h3>
                            <p class="text-yellow-600 text-sm">共 ${appState.bookmarks.length} 题</p>
                        </div>
                        <div class="bg-yellow-200 text-yellow-600 rounded-full w-12 h-12 flex items-center justify-center text-xl shadow-inner">
                            <i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                </div>
            </div>

            <h3 class="text-lg font-bold text-slate-700 mb-4 border-l-4 border-blue-500 pl-3">章节练习</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
        `;

        rawQuizData.forEach((chapter, index) => {
            // 计算进度
            const total = chapter.questions.length;
            let answered = 0;
            chapter.questions.forEach(q => {
                if (appState.progress[q.id]) answered++;
            });
            const percent = total > 0 ? Math.round((answered / total) * 100) : 0;

            html += `
                <div onclick="app.startChapter(${index})" class="bg-white hover:bg-slate-50 cursor-pointer rounded-xl p-5 border border-slate-200 shadow-sm transition relative overflow-hidden group">
                    <div class="absolute top-0 left-0 h-1 bg-blue-500 transition-all duration-500" style="width: ${percent}%"></div>
                    <div class="flex justify-between items-end">
                        <div>
                            <h4 class="text-lg font-bold text-slate-800 mb-1 group-hover:text-blue-600 transition">${chapter.title}</h4>
                            <p class="text-sm text-slate-500">${total} 道精选题</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-semibold px-2 py-1 bg-slate-100 text-slate-600 rounded-md">进度 ${percent}%</span>
                        </div>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        container.innerHTML = html;
    },

    startChapter(index) {
        const chapter = rawQuizData[index];
        runtime.mode = 'chapter';
        runtime.currentList = [...chapter.questions];
        runtime.currentIndex = 0;
        runtime.currentChapterTitle = chapter.title;
        this.renderQuiz();
    },

    startSpecialMode(mode) {
        const dict = getAllQuestionsDict();
        const idList = mode === 'wrong' ? appState.wrongSet : appState.bookmarks;
        
        if (idList.length === 0) {
            alert(`您的${mode === 'wrong' ? '错题本' : '收藏夹'}目前是空的，快去刷题吧！`);
            return;
        }

        runtime.mode = mode;
        runtime.currentList = idList.map(id => dict[id]).filter(q => q !== undefined); // filter out undefined if data changed
        runtime.currentIndex = 0;
        runtime.currentChapterTitle = mode === 'wrong' ? "错题回顾" : "重点收藏";
        this.renderQuiz();
    },

    renderQuiz() {
        if (runtime.currentIndex >= runtime.currentList.length) {
            this.renderSummary();
            return;
        }

        const q = runtime.currentList[runtime.currentIndex];
        const isBookmarked = appState.bookmarks.includes(q.id);
        const container = document.getElementById('app-container');

        // 构建选项HTML
        let optionsHtml = '';
        for (const [key, val] of Object.entries(q.opts)) {
            optionsHtml += `
                <button id="opt-${key}" onclick="app.checkAnswer('${key}')" 
                    class="option-btn w-full text-left bg-white border-2 border-slate-200 rounded-xl p-4 mb-3 text-slate-700 font-medium hover:border-blue-400 hover:bg-blue-50 focus:outline-none">
                    <span class="inline-block w-8 h-8 text-center leading-8 bg-slate-100 text-slate-500 rounded-lg mr-3 font-bold">${key}</span> 
                    <span>${val}</span>
                </button>
            `;
        }

        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in max-w-3xl mx-auto">
                <!-- Quiz Header -->
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <div class="text-sm font-semibold text-slate-500">
                        ${runtime.currentChapterTitle} <span class="mx-2 text-slate-300">|</span> 进度：${runtime.currentIndex + 1} / ${runtime.currentList.length}
                    </div>
                    <button onclick="app.toggleBookmark('${q.id}')" class="text-2xl focus:outline-none transition ${isBookmarked ? 'text-yellow-400 hover:text-yellow-500' : 'text-slate-300 hover:text-yellow-400'}">
                        <i class="${isBookmarked ? 'fa-solid' : 'fa-regular'} fa-star"></i>
                    </button>
                </div>

                <!-- Question Body -->
                <div class="p-6 md:p-8">
                    <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-8 leading-relaxed">
                        ${runtime.currentIndex + 1}. ${q.q}
                    </h3>
                    
                    <div id="options-container" class="mb-6">
                        ${optionsHtml}
                    </div>

                    <!-- Explanation Area (Hidden initially) -->
                    <div id="explanation-area" class="hidden mt-8 p-5 bg-blue-50 border border-blue-100 rounded-xl">
                        <div class="flex items-center mb-2">
                            <span class="font-bold text-slate-700 mr-2">标准答案：</span>
                            <span class="text-lg font-extrabold text-green-600">${q.ans}</span>
                        </div>
                        <div class="text-slate-600 leading-relaxed text-sm md:text-base">
                            <span class="font-bold text-slate-700">详细解析：</span>${q.exp}
                        </div>
                    </div>

                    <!-- Next Button (Hidden initially) -->
                    <div id="next-action" class="hidden mt-8 text-right">
                        <button onclick="app.renderQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition transform hover:-translate-y-1">
                            下一题 <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;

        // 通知 MathJax 重新渲染数学公式
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    },

    checkAnswer(selected) {
        const q = runtime.currentList[runtime.currentIndex];
        const correct = q.ans;
        const isCorrect = selected === correct;

        // 记录进度
        appState.progress[q.id] = isCorrect ? 'correct' : 'wrong';

        // 处理错题本逻辑
        if (!isCorrect) {
            if (!appState.wrongSet.includes(q.id)) appState.wrongSet.push(q.id);
        } else {
            // 如果在错题模式下答对了，可以考虑移出错题本（这里先保留，方便反复复习）
            // 正常练习时答对，如果以前在错题本里，可以选择移除
            const wIdx = appState.wrongSet.indexOf(q.id);
            if (wIdx > -1) appState.wrongSet.splice(wIdx, 1);
        }
        
        saveData();

        // UI反馈
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => {
            btn.classList.add('disabled-option');
            btn.disabled = true; // 禁用所有按钮
        });

        const selectedBtn = document.getElementById(`opt-${selected}`);
        const correctBtn = document.getElementById(`opt-${correct}`);

        if (isCorrect) {
            selectedBtn.classList.remove('disabled-option');
            selectedBtn.classList.add('correct');
        } else {
            selectedBtn.classList.remove('disabled-option');
            selectedBtn.classList.add('wrong');
            correctBtn.classList.remove('disabled-option');
            correctBtn.classList.add('correct');
        }

        // 显示解析和下一题按钮
        const expArea = document.getElementById('explanation-area');
        const nextAction = document.getElementById('next-action');
        expArea.classList.remove('hidden');
        expArea.classList.add('fade-in');
        nextAction.classList.remove('hidden');
        nextAction.classList.add('fade-in');
        
        // 渲染解析中的公式
        if (window.MathJax) {
            MathJax.typesetPromise([expArea]);
        }

        runtime.currentIndex++;
    },

    toggleBookmark(qId) {
        const idx = appState.bookmarks.indexOf(qId);
        if (idx > -1) {
            appState.bookmarks.splice(idx, 1);
        } else {
            appState.bookmarks.push(qId);
        }
        saveData();
        
        // 偷懒的做法：只更新按钮的UI类，不重新渲染整个题
        const btn = document.querySelector('button[onclick^="app.toggleBookmark"]');
        const icon = btn.querySelector('i');
        if (idx > -1) {
            // 移除
            btn.classList.remove('text-yellow-400');
            btn.classList.add('text-slate-300');
            icon.classList.remove('fa-solid');
            icon.classList.add('fa-regular');
        } else {
            // 添加
            btn.classList.remove('text-slate-300');
            btn.classList.add('text-yellow-400');
            icon.classList.remove('fa-regular');
            icon.classList.add('fa-solid');
        }
    },

    renderSummary() {
        const container = document.getElementById('app-container');
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-10 text-center max-w-2xl mx-auto fade-in">
                <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-4">太棒了！你已完成当前练习</h2>
                <p class="text-slate-600 mb-8">刷题进度和错题均已自动保存。</p>
                
                <div class="flex justify-center space-x-4">
                    <button onclick="app.goHome()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-8 rounded-xl transition">
                        返回主页
                    </button>
                    <button onclick="app.startSpecialMode('wrong')" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-xl transition shadow-md">
                        去消灭错题
                    </button>
                </div>
            </div>
        `;
    },

    clearData() {
        if(confirm("确定要清除所有的刷题记录、错题本和收藏夹吗？此操作不可恢复！")) {
            localStorage.removeItem('microEconState');
            appState.progress = {};
            appState.bookmarks = [];
            appState.wrongSet = [];
            this.goHome();
        }
    }
};

// 启动应用
document.addEventListener('DOMContentLoaded', () => {
    app.init();
});

</script>
