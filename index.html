    <!-- Tailwind CSS for clean and modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        };

    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; }
        
        /* --- 针对 iPad/手机 的触控优化 --- */
        button, a { -webkit-tap-highlight-color: transparent; touch-action: manipulation; } /* 消除 iOS 点击时的灰色半透明遮罩，并禁止双击放大 */
        
        .option-btn { transition: all 0.2s ease; }
        .option-btn:active:not(:disabled) { transform: scale(0.98); } /* 增加手指按压时的回缩物理反馈 */
        
        /* 仅在支持鼠标悬浮的设备(电脑)上启用 hover 动画，防止 iPad 上点击后 hover 状态“粘住” */
        @media (hover: hover) {
            .option-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        }
        
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled-option { opacity: 0.7; cursor: not-allowed; }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center cursor-pointer" onclick="app.goHome()">
                <i class="fa-solid fa-graduation-cap mr-2"></i>微经刷题神器
            </h1>
            <div class="flex space-x-4">
                <button onclick="app.startSpecialMode('bookmarks')" class="text-yellow-500 hover:text-yellow-600 font-medium transition">
                    <i class="fa-solid fa-star mr-1"></i>收藏夹
                </button>
                <button onclick="app.startSpecialMode('wrong')" class="text-red-500 hover:text-red-600 font-medium transition">
                    <i class="fa-solid fa-book-book-skull mr-1"></i>错题本
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-grow max-w-4xl mx-auto w-full px-4 py-8">

    <!-- Footer -->
    <footer class="bg-slate-100 py-6 mt-auto border-t border-slate-200">
        <div class="max-w-4xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>数据自动保存在浏览器本地，无需联网即可使用。</p>
            <button onclick="app.clearData()" class="mt-2 text-xs text-slate-400 hover:text-red-500 underline">清除所有本地缓存数据</button>
        </div>
    </footer>

<script>
// --- 题库数据 (Quiz Data) ---
// 为了保证网页性能和代码可读性，这里完整录入了前两章（45题）。
// 你可以随时参照这种 JSON 格式添加后面的章节。
const rawQuizData = [
    {
        id: "c1",
        title: "第一章 导论",
        questions: [
            { id: "1-1", q: "经济学这门学科产生的前提是（ ）。", opts: { A: "货币的产生", B: "政府的出现", C: "资源的稀缺性与人类欲望的无限性", D: "商品交换的出现" }, ans: "C", exp: "经济学的核心在于如何合理配置稀缺资源以满足人类无限的欲望。稀缺性是经济学存在的最基本前提。" },
            { id: "1-2", q: "张三面临两个选择：去公司上班月薪8000元，或者在家全职考研。如果他选择考研，那么他考研的机会成本是（ ）。", opts: { A: "考研购买资料的花费", B: "8000元", C: "8000元加上购买资料的花费", D: "无法计算" }, ans: "C", exp: "机会成本不仅包括实际支出的显性成本（资料费），还包括因为做出选择而放弃的其他用途中最高收益的隐性成本（放弃的8000元月薪）。" },
            { id: "1-3", q: "下列哪一项属于实证经济学（Positive Economics）的表述？（ ）", opts: { A: "国家应该降低个人所得税以刺激消费", B: "提高最低工资标准会导致失业率上升", C: "为了社会公平，政府应该对富人征收重税", D: "目前的通货膨胀率太高了，不可接受" }, ans: "B", exp: "实证经济学研究“是什么”，即客观事实和因果关系，不涉及价值判断。A、C、D均带有“应该”或主观评判，属于规范经济学。" },
            { id: "1-4", q: "生产可能性边界（PPF）向外平移的原因通常是（ ）。", opts: { A: "社会失业率大幅度下降", B: "消费者对某产品的需求急剧增加", C: "该国发生了严重的地震灾害", D: "该国实现了技术进步或发现了新资源" }, ans: "D", exp: "PPF边界的向外移动代表整个社会生产能力的提升，这通常是由生产要素数量的增加或技术进步引起的。失业率下降只是让经济从PPF内部向边界靠近。" },
            { id: "1-5", q: "微观经济学的核心假设之一“理性人”假设，其含义是指（ ）。", opts: { A: "人总是大公无私的", B: "人总是在约束条件下追求自身利益（效用或利润）最大化", C: "人拥有完全的信息，从不犯错", D: "人只关心金钱" }, ans: "B", exp: "“理性人”即经济人假设，指经济活动的主体在给定约束下，总是力图以最小的代价获取最大的经济利益。" },
            { id: "1-6", q: "在边际分析中，理性的决策者采取某项行动的条件是（ ）。", opts: { A: "该行动的总收益大于总成本", B: "该行动的平均收益大于平均成本", C: "该行动的边际收益大于边际成本", D: "该行动的边际成本等于零" }, ans: "C", exp: "边际分析告诉我们，只要多做一单位活动带来的额外收益（边际收益）大于额外成本（边际成本），理性的决策者就会选择去做。" },
            { id: "1-7", q: "微观经济学与宏观经济学的主要区别在于（ ）。", opts: { A: "微观经济学研究资源配置，宏观经济学研究资源利用", B: "微观经济学研究整体经济，宏观经济学研究个体经济", C: "微观经济学不使用数学模型，宏观经济学使用", D: "微观经济学是实证的，宏观经济学是规范的" }, ans: "A", exp: "微观经济学以单个经济单位为对象，核心是价格机制主导的资源配置问题；宏观经济学以整个国民经济为对象，研究失业、通胀、经济增长等资源利用问题。" },
            { id: "1-8", q: "亚当·斯密所说的“看不见的手”是指（ ）。", opts: { A: "政府的宏观调控", B: "市场竞争与价格机制", C: "企业家的慈善行为", D: "国际贸易的关税壁垒" }, ans: "B", exp: "“看不见的手”是斯密用来比喻市场中自发引导资源配置的价格机制。通过价格涨跌，自动协调生产与消费。" },
            { id: "1-9", q: "关于“沉没成本”，下列说法正确的是（ ）。", opts: { A: "它是在边际决策中必须考虑的重要成本", B: "它是已经发生且无法收回的成本", C: "它等同于机会成本", D: "它是一种隐性成本" }, ans: "B", exp: "沉没成本是历史成本，无法通过当前的决策改变。理性的经济决策应该是面向未来的（边际决策），故应忽略沉没成本。" },
            { id: "1-10", q: "一个国家或社会在决定“生产什么、如何生产、为谁生产”这三个基本经济问题时，如果主要依靠政府的指令和计划，这种经济体制称为（ ）。", opts: { A: "纯粹市场经济", B: "混合经济", C: "计划经济", D: "传统经济" }, ans: "C", exp: "完全依靠政府指令配置资源的体制是计划经济体制。依靠价格机制的是市场经济，两者结合的是混合经济。" },
            { id: "1-11", q: "比较优势理论认为，贸易发生的基础是（ ）。", opts: { A: "两国绝对生产成本的差异", B: "两国外汇储备的差异", C: "两国生产同种商品的机会成本的差异", D: "两国地理位置的远近" }, ans: "C", exp: "李嘉图的比较优势理论指出，只要两国生产不同商品的机会成本不同，双方就能通过专业化分工和贸易获得利益。" },
            { id: "1-12", q: "经济物品（Economic Goods）与自由物品（Free Goods）的根本区别在于（ ）。", opts: { A: "是否能带来效用", B: "是否具有稀缺性", C: "是否有实体形态", D: "是否由工厂生产" }, ans: "B", exp: "经济物品是稀缺的，需要付出代价才能获得；而自由物品（如阳光、空气）在常态下是无限的，不具有稀缺性。" },
            { id: "1-13", q: "当一种经济状态已经达到这样一种境地，即如果不使任何人的境况变坏，就不能使任何人的境况变好。这种状态在经济学中被称为（ ）。", opts: { A: "纳什均衡", B: "瓦尔拉斯均衡", C: "帕累托最优", D: "比较优势" }, ans: "C", exp: "帕累托最优是衡量资源配置效率的最高标准，意味着资源配置已经没有改进的余地。" },
            { id: "1-14", q: "生产可能性边界（PPF）通常被画成凹向原点（向外凸出）的形状，这反映了（ ）。", opts: { A: "机会成本递增规律", B: "边际效用递减规律", C: "规模报酬递减规律", D: "边际报酬递减规律" }, ans: "A", exp: "随着把越来越多的资源从生产A物品转移到生产B物品，转移的资源越来越不适应B的生产，导致放弃的A物品越来越多，即机会成本递增。" },
            { id: "1-15", q: "微观经济学的中心理论是（ ）。", opts: { A: "效用理论", B: "生产理论", C: "分配理论", D: "价格理论" }, ans: "D", exp: "微观经济学的所有内容（需求、供给、生产、成本、市场结构等）都是围绕相对价格的决定展开的，因此也被称为价格理论。" }
        ]
    },
    {
        id: "c2",
        title: "第二章 供求理论",
        questions: [
            { id: "2-1", q: "需求定理表明，在其他条件不变的情况下，某种商品的价格下降会导致该商品的（ ）。", opts: { A: "需求增加", B: "需求减少", C: "需求量增加", D: "需求量减少" }, ans: "C", exp: "商品本身价格的变动引起的是“需求量”的变动，在图形上表现为沿着同一条需求曲线移动。" },
            { id: "2-2", q: "某商品A是正常品，当消费者的收入大幅度增加时，商品A的需求曲线将（ ）。", opts: { A: "向右平移", B: "向左平移", C: "保持不变", D: "变陡峭" }, ans: "A", exp: "收入增加是非价格因素的变动，对正常品而言会使需求增加，整条需求曲线向右平移。" },
            { id: "2-3", q: "咖啡和茶叶是替代品。如果咖啡的价格突然暴涨，在其他条件不变的情况下，茶叶的市场将会发生什么变化？（ ）", opts: { A: "茶叶的需求量增加，需求曲线不移动", B: "茶叶的需求增加，需求曲线向右平移", C: "茶叶的供给增加，供给曲线向右平移", D: "茶叶的需求减少，需求曲线向左平移" }, ans: "B", exp: "替代品一方涨价，消费者会转向另一方，导致另一方（茶叶）在任何给定价格下的需求都增加，曲线右移。" },
            { id: "2-4", q: "燃油车和汽油是互补品。当汽油价格大幅下降时，对燃油车市场的影响是（ ）。", opts: { A: "燃油车需求曲线向左平移", B: "燃油车需求曲线向右平移", C: "沿燃油车需求曲线向下移动", D: "无影响" }, ans: "B", exp: "互补品必须配套使用。汽油降价使得开车的综合成本下降，从而增加对燃油车的需求，曲线右移。" },
            { id: "2-5", q: "供给定理说明，商品供给量与其价格之间存在（ ）。", opts: { A: "反向变动关系", B: "正向变动关系", C: "不确定关系", D: "完全无弹性的关系" }, ans: "B", exp: "供给定理指在其他条件不变时，价格越高，生产者愿意提供的产量越多，两者呈正相关。" },
            { id: "2-6", q: "假设某行业实现了重大的技术突破，大幅降低了生产成本。这将导致该产品的（ ）。", opts: { A: "供给曲线向右平移，均衡价格下降", B: "供给曲线向左平移，均衡价格上升", C: "需求曲线向右平移，均衡价格上升", D: "需求曲线向左平移，均衡价格下降" }, ans: "A", exp: "技术突破降低成本，使得生产者在每一价格水平下愿意供给更多，供给曲线右移。供给增加会导致市场均衡价格下降，均衡数量增加。" },
            { id: "2-7", q: "在一个自由竞争的市场中，如果当前的市场价格高于均衡价格，市场中将出现（ ），从而迫使价格（ ）。", opts: { A: "短缺；上升", B: "短缺；下降", C: "过剩；上升", D: "过剩；下降" }, ans: "D", exp: "价格高于均衡点时，供给量大于需求量，出现产品过剩，生产者为了清库存会降价，直到价格回落到均衡点。" },
            { id: "2-8", q: "当一种商品的需求和供给同时增加时，关于新的均衡点，下列说法正确的是（ ）。", opts: { A: "均衡价格必然上升", B: "均衡价格必然下降", C: "均衡数量必然增加", D: "均衡数量必然减少" }, ans: "C", exp: "需求增加使价格和数量同升；供给增加使价格降、数量升。两者叠加，数量必定增加，但价格的变动方向取决于供求相对移动的幅度，无法确定。" },
            { id: "2-9", q: "“谷贱伤农”反映的是农产品市场中存在的一种现象。导致这一现象的根本原因是农产品的（ ）。", opts: { A: "需求富有弹性", B: "需求缺乏弹性", C: "供给富有弹性", D: "供给缺乏弹性" }, ans: "B", exp: "农产品是生活必需品，需求缺乏价格弹性。丰收导致价格下跌的百分比远大于需求量增加的百分比，从而导致农民总收益减少。" },
            { id: "2-10", q: "如果某商品的需求价格弹性为 -2.5（即 $|Ed|=2.5$ ），厂商为了增加销售收入，应该采取的策略是（ ）。", opts: { A: "提高价格", B: "降低价格", C: "保持价格不变", D: "减少产量" }, ans: "B", exp: "弹性绝对值大于1，说明需求富有弹性（如奢侈品），采取“薄利多销”策略即降价，可以使销量大幅上升从而增加总收益。" },
            { id: "2-11", q: "垂直于横轴（数量轴）的需求曲线，其需求价格弹性是（ ）。", opts: { A: "完全无弹性（Ed = 0）", B: "完全有弹性（Ed = ∞）", C: "单位弹性（|Ed| = 1）", D: "缺乏弹性（0 < |Ed| < 1）" }, ans: "A", exp: "垂直需求曲线表示无论价格如何变动，需求量始终不变，即需求对价格毫无反应，属于完全无弹性。" },
            { id: "2-12", q: "已知某商品的需求收入弹性系数为 -0.8，这表明该商品属于（ ）。", opts: { A: "正常品", B: "奢侈品", C: "必需品", D: "低档品（劣等品）" }, ans: "D", exp: "收入弹性小于0意味着随着收入增加，对该商品的需求量反而减少，这是低档品（劣等品）的特征。" },
            { id: "2-13", q: "恩格尔定律指出，随着家庭总收入的增加，家庭用于（ ）的支出占总支出的比例会逐渐下降。", opts: { A: "医疗与教育", B: "食品", C: "娱乐休闲", D: "住房" }, ans: "B", exp: "恩格尔系数是食品支出占总支出的比例。恩格尔定律揭示了收入越高，恩格尔系数越低的规律。" },
            { id: "2-14", q: "政府为了保护消费者的利益，对某生活必需品制定了低于市场均衡价格的“最高限价”。这一政策必然会导致（ ）。", opts: { A: "市场供过于求", B: "市场出现短缺和排队抢购现象", C: "生产者利润大幅增加", D: "产品质量自动提升" }, ans: "B", exp: "最高限价压低了价格，刺激了需求，同时抑制了供给，必然导致供不应求的短缺状态，进而容易滋生黑市和配给制。" },
            { id: "2-15", q: "政府为了保护农业，对农产品实行“支持价格”（最低限价），且该价格高于均衡价格。这会导致（ ）。", opts: { A: "农产品供不应求", B: "农产品过剩", C: "农民总收入一定减少", D: "政府不需要采取任何后续措施" }, ans: "B", exp: "最低限价高于均衡价格会抑制需求、刺激供给，导致农产品过剩。政府通常需要花费资金去收购这些过剩农产品。" },
            { id: "2-16", q: "税负归宿理论表明，当政府对某种商品征收消费税时，如果该商品的供给极其缺乏弹性，而需求富有弹性，那么税负将主要由（ ）承担。", opts: { A: "消费者", B: "生产者", C: "政府", D: "双方平均分担" }, ans: "B", exp: "税负分担原则是“谁缺乏弹性（谁跑不掉），谁承担更多税负”。供给缺乏弹性意味着生产者更难调整，因此承担主要税负。" },
            { id: "2-17", q: "在蛛网模型中，当供给曲线的斜率绝对值大于需求曲线的斜率绝对值（即供给比需求更缺乏弹性）时，市场价格的波动将（ ）。", opts: { A: "越来越大（发散型）", B: "越来越小，趋于均衡（收敛型）", C: "保持固定幅度（封闭型）", D: "呈现随机状态" }, ans: "B", exp: "供给曲线比需求曲线陡峭（缺乏弹性）是收敛型蛛网的条件，震荡会逐渐减弱并达到均衡点。" },
            { id: "2-18", q: "商品A和B的交叉弹性系数为正数，当A商品价格下降时，B商品的需求曲线将（ ）。", opts: { A: "向右平移", B: "向左平移", C: "不移动", D: "变平缓" }, ans: "B", exp: "交叉弹性为正说明A和B是替代品。A降价，人们多买A少买B，因此B的需求减少，需求曲线向左平移。" },
            { id: "2-19", q: "影响供给价格弹性最重要的因素之一是（ ）。", opts: { A: "商品的可替代程度", B: "商品在消费者预算中的比例", C: "生产者调整生产规模所需要的时间", D: "商品的必需程度" }, ans: "C", exp: "A、B、D都是影响需求弹性的因素。时间长短是影响供给弹性的核心，时间越长，越容易调整产能，供给弹性越大。" },
            { id: "2-20", q: "计算弧弹性时采用中点公式的主要目的是（ ）。", opts: { A: "使计算更简单", B: "确保弹性值始终为正数", C: "避免因涨价和降价的基准不同而得出不同的弹性数值", D: "将需求和供给结合起来" }, ans: "C", exp: "用传统的起点公式，价格从10降到8和从8涨到10算出的弹性不同，中点公式通过取平均值作为基准消除了这种差异。" },
            { id: "2-21", q: "某品牌手机价格从4000元下降到3600元，其销量从1万台增加到1.5万台。在这个价格区间内，该手机的需求（ ）。", opts: { A: "缺乏弹性", B: "富有弹性", C: "具有单位弹性", D: "完全无弹性" }, ans: "B", exp: "价格下降百分比为 (400-4000)/4000 = 10%，销量增加百分比为 (1.5-1)/1 = 50%。由于50% > 10%，因此富有弹性。" },
            { id: "2-22", q: "对于直线型需求曲线，沿着曲线向右下方移动时，其需求价格弹性的绝对值将（ ）。", opts: { A: "不断增大", B: "不断减小", C: "始终为1", D: "保持不变" }, ans: "B", exp: "点弹性公式中包含 P/Q。沿需求曲线下移，P变小，Q变大，因此 P/Q 变小，弹性绝对值不断减小。" },
            { id: "2-23", q: "消费者剩余是指（ ）。", opts: { A: "消费者没花完的钱", B: "消费者对物品的客观评价", C: "消费者愿意支付的最高价格与其实际支付价格之间的差额", D: "消费带来的边际效用" }, ans: "C", exp: "消费者剩余是主观心理上获得的一种“赚到了”的福利感受，等于意愿支付的最高金额减去实际市场价格。" },
            { id: "2-24", q: "生产者剩余的几何表示通常是（ ）。", opts: { A: "需求曲线以下，价格线以上的面积", B: "供给曲线以上，价格线以下的面积", C: "需求曲线与供给曲线之间的面积", D: "无差异曲线上的点" }, ans: "B", exp: "生产者剩余是实际接受的价格与愿意接受的最低价格（供给曲线/边际成本曲线）之间的差额，位于价格线以下、供给曲线以上。" },
            { id: "2-25", q: "替代效应是指（ ）。", opts: { A: "总效用变化引起的需求量变化", B: "实际收入变动引起的需求量变化", C: "在实际效用不变时，相对价格改变引起的需求量变化", D: "消费者偏好改变引起的变化" }, ans: "C", exp: "替代效应剥离了实际购买力的影响，纯粹看商品之间相对便宜/昂贵所导致的互相替代。" },
            { id: "2-26", q: "正常物品价格下降时，关于替代效应与收入效应，下列说法正确的是（ ）。", opts: { A: "替代效应与收入效应方向相反", B: "替代效应使需求量增加，收入效应也使需求量增加", C: "替代效应使需求量减少，收入效应使需求量增加", D: "替代效应为负，收入效应为0" }, ans: "B", exp: "正常品降价，替代效应让人们多买它；降价相当于实际收入增加，正常品的收入效应也会让人们多买它。两者同向增加。" },
            { id: "2-27", q: "对于低档品而言，当其价格下降时，收入效应会导致该物品的需求量（ ）。", opts: { A: "增加", B: "减少", C: "不变", D: "先增后减" }, ans: "B", exp: "价格下降导致消费者的实际收入增加。因为是低档品（劣等品），收入增加反而会让人们少买它去买更好的替代品，所以收入效应使需求量减少。" },
            { id: "2-28", q: "吉芬商品（Giffen Goods）必定是（ ）。", opts: { A: "正常品", B: "奢侈品", C: "低档品", D: "替代品" }, ans: "C", exp: "吉芬商品是低档品中的极端情况。它的收入效应不仅反向，而且绝对值大到盖过了替代效应，导致降价时总需求量反而减少。" },
            { id: "2-29", q: "在完全竞争市场上，如果对产品征收消费税，且供求弹性都不为0或无穷大，那么征税会导致（ ）。", opts: { A: "消费者剩余减少，生产者剩余增加", B: "消费者剩余和生产者剩余都减少", C: "只有政府获利，无谓损失为0", D: "总福利增加" }, ans: "B", exp: "征税会抬高买方支付的价格，压低卖方收到的净价，导致消费者剩余和生产者剩余同时缩水，并产生无谓损失（社会净福利的绝对减少）。" },
            { id: "2-30", q: "如果某种商品处于“供不应求”的状态，通常会伴随下列哪种信号来调节市场？（ ）", opts: { A: "政府给予补贴", B: "价格上涨信号", C: "价格下跌信号", D: "厂商削减产量" }, ans: "B", exp: "供不应求会导致买方之间的竞争加剧，从而推高价格。价格上涨信号会刺激生产者增加供给、抑制部分消费者需求，最终恢复均衡。" }
        ]
    },
    {
        id: "c3",
        title: "第三章 弹性理论",
        questions: [
            {id:"3-1",q:"弹性是指（ ）变动一个百分比所引起的（ ）变动的百分比。",opts:{A:"自变量；因变量",B:"因变量；自变量",C:"价格；数量",D:"数量；价格"},ans:"A",exp:"正确答案A"},
            {id:"3-2",q:"需求价格弹性衡量的是（ ）。",opts:{A:"消费者收入变化对需求量的影响",B:"某种商品价格变化对该商品需求量的影响",C:"相关商品价格变化对该商品需求量的影响",D:"供给量变化对价格的影响"},ans:"B",exp:"正确答案B"},
            {id:"3-3",q:"一般来说，生活必需品的需求价格弹性（ ）。",opts:{A:"大于1（富有弹性）",B:"等于1",C:"小于1（缺乏弹性）",D:"等于0"},ans:"C",exp:"正确答案C"},
            {id:"3-4",q:"直线需求曲线上，点弹性随着价格的下降而（ ）。",opts:{A:"逐渐增大",B:"逐渐减小",C:"保持不变",D:"先增大后减小"},ans:"B",exp:"正确答案B"},
            {id:"3-5",q:"当 |Ed| > 1（富有弹性）时，降价会导致总收益（ ）。",opts:{A:"增加",B:"减少",C:"不变",D:"无法确定"},ans:"A",exp:"富有弹性降价增收"},
            {id:"3-6",q:"俗语说“薄利多销”适用于（ ）的商品。",opts:{A:"需求缺乏弹性",B:"需求富有弹性",C:"需求具有单位弹性",D:"供给富有弹性"},ans:"B",exp:"正确答案B"},
            {id:"3-7",q:"对于需求缺乏弹性的商品，厂商为增加总收益，应采取（ ）。",opts:{A:"降价",B:"提价",C:"保持原价",D:"降价促销"},ans:"B",exp:"缺乏弹性提价增收"},
            {id:"3-8",q:"需求收入弹性大于0的商品被称为（ ）。",opts:{A:"劣等品",B:"正常商品",C:"互补品",D:"替代品"},ans:"B",exp:"正确答案B"},
            {id:"3-9",q:"恩格尔系数（或需求收入弹性）在0和1之间的商品通常是（ ）。",opts:{A:"奢侈品",B:"必需品",C:"劣等品",D:"吉芬商品"},ans:"B",exp:"0<Ey<1为必需品"},
            {id:"3-10",q:"已知供给函数 Qs = c + dP（c,d>0），价格P=1时的点弹性 Es（ ）。",opts:{A:"小于1",B:"大于1",C:"等于1",D:"等于0"},ans:"A",exp:"公式推导d/(c+d)<1"},
            {id:"3-11",q:"供给价格弹性的大小主要取决于（ ）。",opts:{A:"消费者偏好",B:"生产技术的复杂程度和生产周期长短",C:"商品用途的广泛性",D:"预算占比"},ans:"B",exp:"供给端因素"},
            {id:"3-12",q:"需求交叉弹性为正数，说明商品X和Y是（ ）。",opts:{A:"互补品",B:"替代品",C:"独立品",D:"正常品"},ans:"B",exp:"同向变动为替代品"},
            {id:"3-13",q:"“谷贱伤农”解释：农产品属（ ）商品，丰收降价导致需求增加幅度（ ）降价幅度。",opts:{A:"富有弹性；大于",B:"缺乏弹性；小于",C:"缺乏弹性；大于",D:"富有弹性；小于"},ans:"B",exp:"正确答案B"},
            {id:"3-14",q:"若需求弹性极小、供给弹性很大，政府征税时税收负担主要由（ ）承担。",opts:{A:"生产者",B:"消费者",C:"政府",D:"双方均摊"},ans:"B",exp:"正确答案B"},
            {id:"3-15",q:"哪一方在市场中“更缺乏弹性”，其承担的税收就（ ）。",opts:{A:"越少",B:"越多",C:"不受影响",D:"视情况而定"},ans:"B",exp:"缺乏弹性者税负重"},
            {id:"3-16",q:"蛛网模型通常用于分析（ ）的动态波动过程。",opts:{A:"生产周期极短产品",B:"具有较长生产周期产品",C:"高科技产品",D:"工业制成品"},ans:"B",exp:"正确答案B"},
            {id:"3-17",q:"蛛网模型中，“收敛型蛛网”的条件是（ ）。",opts:{A:"供给弹性 > 需求弹性",B:"供给弹性 < 需求弹性",C:"供给弹性 = 需求弹性",D:"无关"},ans:"B",exp:"供给曲线斜率绝对值>需求曲线"},
            {id:"3-18",q:"在发散型蛛网模型中，价格波动会（ ）。",opts:{A:"越来越小",B:"保持恒定",C:"越来越大",D:"随机"},ans:"C",exp:"正确答案C"},
            {id:"3-19",q:"迷幻商品（如毒品）打击供给效果有限，是因为其（ ）。",opts:{A:"供给富有弹性",B:"需求富有弹性",C:"需求缺乏弹性",D:"供给缺乏弹性"},ans:"C",exp:"成瘾性致严重缺乏弹性"},
            {id:"3-20",q:"直线型需求曲线上中点的价格弹性为（ ）。",opts:{A:"|Ed| > 1",B:"|Ed| < 1",C:"|Ed| = 1",D:"|Ed| = 0"},ans:"C",exp:"正确答案C"},
            {id:"3-21",q:"以下哪种商品需求价格弹性最大？（ ）",opts:{A:"电",B:"盐",C:"某特定品牌和型号的智能手机",D:"粮食"},ans:"C",exp:"替代品最多"},
            {id:"3-22",q:"两种商品完全替代，其需求交叉弹性将（ ）。",opts:{A:"趋近正无穷大",B:"等于零",C:"趋近负无穷大",D:"为负常数"},ans:"A",exp:"正确答案A"},
            {id:"3-23",q:"短期内厂商供给弹性通常比长期内（ ），因为短期内厂商（ ）。",opts:{A:"大；易调整规模",B:"小；难迅速扩充规模",C:"大；不受成本限制",D:"小；成本可忽略"},ans:"B",exp:"正确答案B"},
            {id:"3-24",q:"商品价格上升10%，需求量下降5%，弹性绝对值为（ ）。",opts:{A:"0.5",B:"2.0",C:"5.0",D:"10.0"},ans:"A",exp:"5/10=0.5"},
            {id:"3-25",q:"需求函数 Qd = 100 - 2P，当 P=25 时，点弹性绝对值为（ ）。",opts:{A:"0.5",B:"1.0",C:"2.0",D:"无穷大"},ans:"B",exp:"2*(25/50)=1"},
            {id:"3-26",q:"影响商品需求价格弹性的因素不包括（ ）。",opts:{A:"可替代程度",B:"预算占比",C:"调整时间",D:"生产技术复杂程度"},ans:"D",exp:"影响供给弹性"},
            {id:"3-27",q:"奢侈品的需求收入弹性 Ey 满足（ ）。",opts:{A:"Ey < 0",B:"0 < Ey < 1",C:"Ey > 1",D:"Ey = 1"},ans:"C",exp:"正确答案C"},
            {id:"3-28",q:"需求曲线是一条垂直线，表明（ ）。",opts:{A:"需求完全有弹性",B:"需求完全无弹性",C:"单位弹性",D:"供给无弹性"},ans:"B",exp:"正确答案B"},
            {id:"3-29",q:"政府对需求完全无弹性的产品征税，税收将由（ ）承担。",opts:{A:"生产者",B:"消费者",C:"各一半",D:"政府"},ans:"B",exp:"正确答案B"},
            {id:"3-30",q:"计算弧弹性使用中点公式是为了（ ）。",opts:{A:"简化计算",B:"避免涨跌基准不同得出不同弹性值",C:"始终为正",D:"转为点弹性"},ans:"B",exp:"正确答案B"}
        ]

    {
        id: "c4",

        questions: [

            {id:"4-2",q:"“边际效用递减规律”指随着消费量增加，其（ ）。",opts:{A:"总效用不断减少",B:"增加的最后一单位商品带来的效用增量不断减少",C:"平均效用增加",D:"边际效用等比增加"},ans:"B",exp:"正确答案B"},
            {id:"4-3",q:"关于TU和MU，正确的是（ ）。",opts:{A:"当MU=0时，TU最大",B:"当MU>0时，TU减少",C:"MU随TU增加而增加",D:"MU负数时，TU增加"},ans:"A",exp:"正确答案A"},

            {id:"4-9",q:"序数效用论采用（ ）。",opts:{A:"边际效用分析",B:"成本收益分析",C:"供求定理",D:"无差异曲线分析"},ans:"D",exp:"正确答案D"},
            {id:"4-10",q:"关于无差异曲线特征，错误的是（ ）。",opts:{A:"向右下方倾斜",B:"不相交",C:"越远效用越高",D:"凹向原点"},ans:"D",exp:"正确答案D"},
            {id:"4-11",q:"任意两条无差异曲线不能相交，基于（ ）假设。",opts:{A:"完备性",B:"传递性",C:"不饱和性",D:"理性人"},ans:"B",exp:"正确答案B"},

    {
        id: "c7",
        title: "第七章 非完全竞争市场理论",
        questions: [
            {id:"7-1",q:"完全垄断市场最基本的特征是（ ）。",opts:{A:"厂商可以任意定价",B:"行业中只有唯一的厂商，且产品无相近替代品",C:"存在一定程度的竞争",D:"政府完全控制"},ans:"B",exp:"正确答案B"},
            {id:"7-2",q:"以下哪项通常不是完全垄断形成的原因？（ ）",opts:{A:"控制了关键生产资源",B:"规模经济导致的自然垄断",C:"专利权和知识产权保护",D:"产品需求极度富有弹性"},ans:"D",exp:"正确答案D"},
            {id:"7-3",q:"对完全垄断厂商而言，其面临的需求曲线是一条（ ）。",opts:{A:"水平线",B:"垂直线",C:"向右下方倾斜的曲线",D:"向右上方倾斜的曲线"},ans:"C",exp:"正确答案C"},
            {id:"7-4",q:"在完全垄断市场中，厂商的边际收益（MR）与价格（P）的关系是（ ）。",opts:{A:"MR = P",B:"MR > P",C:"MR < P",D:"无法确定"},ans:"C",exp:"正确答案C"},
            {id:"7-5",q:"任何垄断厂商实现利润最大化的条件都是（ ）。",opts:{A:"P = MC",B:"MR = MC",C:"P = AC",D:"TR = TC"},ans:"B",exp:"正确答案B"},
            {id:"7-6",q:"与完全竞争相比，完全垄断在均衡状态下通常表现为（ ）。",opts:{A:"产量更高，价格更低",B:"产量更低，价格更高",C:"产量和价格都更高",D:"产量和价格都更低"},ans:"B",exp:"正确答案B"},
            {id:"7-7",q:"自然垄断（Natural Monopoly）的形成主要是由于（ ）。",opts:{A:"政府特许",B:"显著的规模经济导致平均成本在很大产量范围内持续下降",C:"拥有独家技术",D:"控制了全部自然资源"},ans:"B",exp:"正确答案B"},
            {id:"7-8",q:"价格歧视（Price Discrimination）是指（ ）。",opts:{A:"针对不同成本的产品收取不同价格",B:"对同一产品针对不同消费者或不同购买量收取不同价格",C:"在不同时间段收取不同价格",D:"大规模降价促销"},ans:"B",exp:"正确答案B"},
            {id:"7-9",q:"垄断厂商向每一个消费者索取他愿意支付的最高价格，属于（ ）。",opts:{A:"一级价格歧视",B:"二级价格歧视",C:"三级价格歧视",D:"倾销"},ans:"A",exp:"正确答案A"},
            {id:"7-10",q:"对同一消费者购买相同商品的不同数量区段收取不同价格，这属于（ ）。",opts:{A:"一级价格歧视",B:"二级价格歧视",C:"三级价格歧视",D:"统一按边际成本定价"},ans:"B",exp:"正确答案B"},
            {id:"7-11",q:"根据不同市场的需求弹性将消费者分为不同群体，并在不同市场收取不同价格，这属于（ ）。",opts:{A:"一级价格歧视",B:"二级价格歧视",C:"三级价格歧视",D:"捆绑定价"},ans:"C",exp:"正确答案C"},
            {id:"7-12",q:"实行三级价格歧视的垄断厂商，其利润最大化的条件是（ ）。",opts:{A:"P1 = P2 = MC",B:"MR1 = MR2 = MC",C:"TR1 = TR2",D:"两个市场的需求弹性相等"},ans:"B",exp:"正确答案B"},
            {id:"7-13",q:"在三级价格歧视中，垄断厂商会对需求价格弹性（绝对值）较（ ）的市场收取较（ ）的价格。",opts:{A:"大；高",B:"小；低",C:"小；高",D:"大；低"},ans:"C",exp:"正确答案C"},
            {id:"7-14",q:"垄断竞争市场的最主要特征，也是它区别于完全竞争市场的核心在于（ ）。",opts:{A:"厂商数量少",B:"存在进入壁垒",C:"存在产品差别",D:"只有一家厂商"},ans:"C",exp:"正确答案C"},

            {id:"7-16",q:"在短期内，垄断竞争厂商的均衡条件是（ ）。",opts:{A:"P = MC",B:"MR = SMC，且可能有超额利润或亏损",C:"P = min AC",D:"经济利润必然为零"},ans:"B",exp:"正确答案B"},
            {id:"7-17",q:"垄断竞争厂商在长期均衡时，其经济利润为零的原因是（ ）。",opts:{A:"厂商勾结",B:"行业内存在自由的进入和退出",C:"生产效率极高",D:"政府实行价格管制"},ans:"B",exp:"正确答案B"},
            {id:"7-18",q:"垄断竞争厂商长期均衡的条件是（ ）。",opts:{A:"P = MC",B:"MR = LMC，且 P = LAC",C:"P = min LAC",D:"MR = MC = P"},ans:"B",exp:"正确答案B"},
            {id:"7-19",q:"垄断竞争厂商长期均衡时，价格曲线（d曲线）与平均成本曲线（LAC）相切于（ ）。",opts:{A:"LAC的最低点",B:"LAC最低点的右侧",C:"LAC最低点的左侧（未达到最低点）",D:"任意一点"},ans:"C",exp:"正确答案C"},
            {id:"7-20",q:"寡头垄断市场（Oligopoly）的最典型特征是（ ）。",opts:{A:"只有唯一的卖者",B:"厂商之间存在强烈的相互依存性（战略互动）",C:"产品完全同质",D:"没有进入壁垒"},ans:"B",exp:"正确答案B"},
            {id:"7-21",q:"古诺模型（Cournot Model）的基本假定是（ ）。",opts:{A:"寡头之间相互勾结",B:"每个寡头假定竞争对手的价格不变",C:"每个寡头假定竞争对手的产量不变",D:"存在一个领导厂商"},ans:"C",exp:"正确答案C"},
            {id:"7-22",q:"纯粹双寡头面临需求曲线 P = H - aQ，成本为0。在古诺均衡下，每个厂商的产量为（ ）。",opts:{A:"H / 2a",B:"H / 3a",C:"H / 4a",D:"H / a"},ans:"B",exp:"推导得Qa=Qb=H/3a"},
            {id:"7-23",q:"斯坦克贝模型（Stackelberg Model）描述的是（ ）。",opts:{A:"价格领导",B:"先后决定产量的领导者-追随者模型",C:"勾结卡特尔",D:"同时决定价格"},ans:"B",exp:"正确答案B"},

            {id:"7-25",q:"斯威齐模型主要用于解释寡头市场中的（ ）现象。",opts:{A:"价格战",B:"产量剧烈波动",C:"价格刚性（价格相对稳定）",D:"勾结定价"},ans:"C",exp:"正确答案C"},
            {id:"7-26",q:"斯威齐模型的基础假设是：如果一个寡头提价，竞争对手将（ ）；降价则（ ）。",opts:{A:"跟着提价；跟着降价",B:"不跟着提价；跟着降价",C:"跟着提价；不跟着降价",D:"不跟着提价；不跟着降价"},ans:"B",exp:"跟跌不跟涨"},

// --- 状态管理 (State Management) ---
const appState = {
    progress: {},      // { "1-1": "correct", "1-2": "wrong" }
    bookmarks: [],     // [ "1-1", "2-3" ]
    wrongSet: [],      // [ "1-2" ]
    chapterIndex: {}   // 记忆每个章节的进度 { "c1": 5, "c2": 10 }
};

// 当前应用状态
const runtime = {
    mode: 'home',      // 'home', 'chapter', 'wrong', 'bookmarks'
    currentChapterId: null, // 当前章节ID
    currentList: [],   // Array of questions for current session
    currentIndex: 0,
    currentChapterTitle: ""
};

// --- 初始化与本地存储 (Init & Storage) ---
function loadData() {
    const saved = localStorage.getItem('microEconState');
    if (saved) {
        Object.assign(appState, JSON.parse(saved));
    }
}

function saveData() {
    localStorage.setItem('microEconState', JSON.stringify(appState));
}

// 获取所有题目扁平化字典便于查找
function getAllQuestionsDict() {
    const dict = {};
    rawQuizData.forEach(chapter => {
        chapter.questions.forEach(q => {
            dict[q.id] = { ...q, chapterTitle: chapter.title };
        });
    });
    return dict;
}

// --- UI 渲染逻辑 (UI Rendering) ---
const app = {
    init() {
        loadData();
        this.goHome();
    },

    goHome() {
        runtime.mode = 'home';
        const container = document.getElementById('app-container');
        
        let html = `
            <div class="text-center mb-10 fade-in">
                <h2 class="text-3xl font-extrabold text-slate-800 mb-3">微观经济学 模拟题库</h2>
                <p class="text-slate-500">按照章节进行专项训练，自动记录错题与收藏。</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 fade-in">
                <!-- 错题本卡片 -->
                <div onclick="app.startSpecialMode('wrong')" class="bg-red-50 hover:bg-red-100 cursor-pointer rounded-2xl p-6 border border-red-100 shadow-sm transition">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-xl font-bold text-red-700 mb-1">错题本</h3>
                            <p class="text-red-500 text-sm">共 ${appState.wrongSet.length} 题</p>
                        </div>
                        <div class="bg-red-200 text-red-600 rounded-full w-12 h-12 flex items-center justify-center text-xl shadow-inner">
                            <i class="fa-solid fa-book-book-skull"></i>
                        </div>
                    </div>
                </div>

                <!-- 收藏夹卡片 -->
                <div onclick="app.startSpecialMode('bookmarks')" class="bg-yellow-50 hover:bg-yellow-100 cursor-pointer rounded-2xl p-6 border border-yellow-100 shadow-sm transition">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-xl font-bold text-yellow-700 mb-1">重点收藏</h3>
                            <p class="text-yellow-600 text-sm">共 ${appState.bookmarks.length} 题</p>
                        </div>
                        <div class="bg-yellow-200 text-yellow-600 rounded-full w-12 h-12 flex items-center justify-center text-xl shadow-inner">
                            <i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                </div>
            </div>

            <h3 class="text-lg font-bold text-slate-700 mb-4 border-l-4 border-blue-500 pl-3">章节练习</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
        `;

        rawQuizData.forEach((chapter, index) => {
            // 计算进度
            const total = chapter.questions.length;
            let answered = 0;
            chapter.questions.forEach(q => {
                if (appState.progress[q.id]) answered++;
            });
            const percent = total > 0 ? Math.round((answered / total) * 100) : 0;

            html += `
                <div onclick="app.startChapter(${index})" class="bg-white hover:bg-slate-50 cursor-pointer rounded-xl p-5 border border-slate-200 shadow-sm transition relative overflow-hidden group">
                    <div class="absolute top-0 left-0 h-1 bg-blue-500 transition-all duration-500" style="width: ${percent}%"></div>
                    <div class="flex justify-between items-end">
                        <div>
                            <h4 class="text-lg font-bold text-slate-800 mb-1 group-hover:text-blue-600 transition">${chapter.title}</h4>
                            <p class="text-sm text-slate-500">${total} 道精选题</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-semibold px-2 py-1 bg-slate-100 text-slate-600 rounded-md">进度 ${percent}%</span>
                        </div>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        container.innerHTML = html;
    },

    startChapter(index) {
        const chapter = rawQuizData[index];
        runtime.mode = 'chapter';
        runtime.currentChapterId = chapter.id;
        runtime.currentList = [...chapter.questions];
        
        // 读取保存的进度
        runtime.currentIndex = appState.chapterIndex[chapter.id] || 0;
        
        // 如果已经做完，询问是否重头开始
        if (runtime.currentIndex >= runtime.currentList.length) {
            if (confirm(`您已完成《${chapter.title}》的所有题目，是否重新开始？`)) {
                runtime.currentIndex = 0;
                appState.chapterIndex[chapter.id] = 0;
                saveData();
            } else {
                this.goHome();
                return;
            }
        }

        runtime.currentChapterTitle = chapter.title;
        this.renderQuiz();
    },

    startSpecialMode(mode) {
        const dict = getAllQuestionsDict();
        const idList = mode === 'wrong' ? appState.wrongSet : appState.bookmarks;
        
        if (idList.length === 0) {
            alert(`您的${mode === 'wrong' ? '错题本' : '收藏夹'}目前是空的，快去刷题吧！`);
            return;
        }

        runtime.mode = mode;
        runtime.currentList = idList.map(id => dict[id]).filter(q => q !== undefined); // filter out undefined if data changed
        runtime.currentIndex = 0; // 专项模式每次从头开始
        runtime.currentChapterTitle = mode === 'wrong' ? "错题回顾" : "重点收藏";
        this.renderQuiz();
    },

    renderQuiz() {
        if (runtime.currentIndex >= runtime.currentList.length) {
            this.renderSummary();
            return;
        }

        const q = runtime.currentList[runtime.currentIndex];
        const isBookmarked = appState.bookmarks.includes(q.id);
        const container = document.getElementById('app-container');

        // 构建选项HTML
        let optionsHtml = '';
        for (const [key, val] of Object.entries(q.opts)) {
            optionsHtml += `
                <button id="opt-${key}" onclick="app.checkAnswer('${key}')" 
                    class="option-btn w-full text-left bg-white border-2 border-slate-200 rounded-xl p-4 mb-3 text-slate-700 font-medium hover:border-blue-400 hover:bg-blue-50 focus:outline-none">
                    <span class="inline-block w-8 h-8 text-center leading-8 bg-slate-100 text-slate-500 rounded-lg mr-3 font-bold">${key}</span> 
                    <span>${val}</span>
                </button>
            `;
        }

        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in max-w-3xl mx-auto">
                <!-- Quiz Header -->
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <div class="text-sm font-semibold text-slate-500">
                        ${runtime.currentChapterTitle} <span class="mx-2 text-slate-300">|</span> 进度：${runtime.currentIndex + 1} / ${runtime.currentList.length}
                    </div>
                    <button onclick="app.toggleBookmark('${q.id}')" class="text-2xl focus:outline-none transition ${isBookmarked ? 'text-yellow-400 hover:text-yellow-500' : 'text-slate-300 hover:text-yellow-400'}">
                        <i class="${isBookmarked ? 'fa-solid' : 'fa-regular'} fa-star"></i>
                    </button>
                </div>

                <!-- Question Body -->
                <div class="p-6 md:p-8">
                    <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-8 leading-relaxed">
                        ${runtime.currentIndex + 1}. ${q.q}
                    </h3>
                    
                    <div id="options-container" class="mb-6">
                        ${optionsHtml}
                    </div>

                    <!-- Explanation Area (Hidden initially) -->
                    <div id="explanation-area" class="hidden mt-8 p-5 bg-blue-50 border border-blue-100 rounded-xl">
                        <div class="flex items-center mb-2">
                            <span class="font-bold text-slate-700 mr-2">标准答案：</span>
                            <span class="text-lg font-extrabold text-green-600">${q.ans}</span>
                        </div>
                        <div class="text-slate-600 leading-relaxed text-sm md:text-base">
                            <span class="font-bold text-slate-700">详细解析：</span>${q.exp}
                        </div>
                    </div>

                    <!-- Next Button (Hidden initially) -->
                    <div id="next-action" class="hidden mt-8 text-right">
                        <button onclick="app.renderQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition transform hover:-translate-y-1">
                            下一题 <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;

        // 通知 MathJax 重新渲染数学公式
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    },

    checkAnswer(selected) {
        const q = runtime.currentList[runtime.currentIndex];
        const correct = q.ans;
        const isCorrect = selected === correct;

        // 记录进度
        appState.progress[q.id] = isCorrect ? 'correct' : 'wrong';

        // 处理错题本逻辑 (只增不减)
        if (!isCorrect) {
            if (!appState.wrongSet.includes(q.id)) appState.wrongSet.push(q.id);
        }
        
        // 记录章节进度（当前题做完，进度指向下一题）
        if (runtime.mode === 'chapter') {
            appState.chapterIndex[runtime.currentChapterId] = runtime.currentIndex + 1;
        }

        saveData();

        // UI反馈
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => {
            btn.classList.add('disabled-option');
            btn.disabled = true; // 禁用所有按钮
        });

        const selectedBtn = document.getElementById(`opt-${selected}`);
        const correctBtn = document.getElementById(`opt-${correct}`);

        if (isCorrect) {
            selectedBtn.classList.remove('disabled-option');
            selectedBtn.classList.add('correct');
        } else {
            selectedBtn.classList.remove('disabled-option');
            selectedBtn.classList.add('wrong');
            correctBtn.classList.remove('disabled-option');
            correctBtn.classList.add('correct');
        }

        // 显示解析和下一题按钮
        const expArea = document.getElementById('explanation-area');
        const nextAction = document.getElementById('next-action');
        expArea.classList.remove('hidden');
        expArea.classList.add('fade-in');
        nextAction.classList.remove('hidden');
        nextAction.classList.add('fade-in');
        
        // 渲染解析中的公式
        if (window.MathJax) {
            MathJax.typesetPromise([expArea]);
        }

        runtime.currentIndex++;
    },

    toggleBookmark(qId) {
        const idx = appState.bookmarks.indexOf(qId);
        if (idx > -1) {
            appState.bookmarks.splice(idx, 1);
        } else {
            appState.bookmarks.push(qId);
        }
        saveData();
        
        // 偷懒的做法：只更新按钮的UI类，不重新渲染整个题
        const btn = document.querySelector('button[onclick^="app.toggleBookmark"]');
        const icon = btn.querySelector('i');
        if (idx > -1) {
            // 移除
            btn.classList.remove('text-yellow-400');
            btn.classList.add('text-slate-300');
            icon.classList.remove('fa-solid');
            icon.classList.add('fa-regular');
        } else {
            // 添加
            btn.classList.remove('text-slate-300');
            btn.classList.add('text-yellow-400');
            icon.classList.remove('fa-regular');
            icon.classList.add('fa-solid');
        }
    },

    renderSummary() {
        const container = document.getElementById('app-container');
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-10 text-center max-w-2xl mx-auto fade-in">
                <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-4">太棒了！你已完成当前练习</h2>
                <p class="text-slate-600 mb-8">刷题进度和错题均已自动保存。</p>
                
                <div class="flex justify-center space-x-4">
                    <button onclick="app.goHome()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-8 rounded-xl transition">
                        返回主页
                    </button>
                    <button onclick="app.startSpecialMode('wrong')" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-xl transition shadow-md">
                        去消灭错题
                    </button>
                </div>
            </div>
        `;
    },

    clearData() {
        if(confirm("确定要清除所有的刷题记录、错题本和收藏夹吗？此操作不可恢复！")) {
            localStorage.removeItem('microEconState');
            appState.progress = {};
            appState.bookmarks = [];
            appState.wrongSet = [];
            appState.chapterIndex = {};
            this.goHome();
        }
    }
};

// 启动应用
document.addEventListener('DOMContentLoaded', () => {
    app.init();
});

</script>
</body>
</html>
